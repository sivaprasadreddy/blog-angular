<div class="container">
  <div class="pt-2 pb-2">
    <form [formGroup]="searchForm" id="searchForm" method="get" (ngSubmit)="search()">
      <div class="input-group mb-3">
        <input
          class="form-control"
          type="text"
          name="query"
          placeholder="Search"
          formControlName="query"
        />
        <button class="btn btn-primary" type="submit">Search</button>
      </div>
    </form>
  </div>

  <div class="row">
    <div class="col-12">
      @for (post of posts().data; track post) {
        <div class="card mb-3">
          <div class="card-body">
            <a class="h4 text-decoration-none pt-1" href="/posts/{{ post.slug }}">
              {{ post.title }}
            </a>
            <div class="pt-3">
              <div class="pb-1">
                <span class="me-2">
                  <i class="fa fa-user"></i>&nbsp; <strong>{{ post.authorName }}</strong></span
                >
                <span class="me-1">
                  <i class="fa fa-calendar"></i>&nbsp;
                  <strong>{{ post.createdAt | date }}</strong>
                </span>
              </div>
              <p>{{ post.content }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
  <app-pagination [postsResponse]="posts()" [query]="searchForm.value.query || ''"></app-pagination>
</div>
